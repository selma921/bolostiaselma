<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolos da Tia Selma - Delícias Caseiras em Icoaraci</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --laranja: #ff8c00;
            --laranja-escuro: #e67700;
            --marrom: #5d2906;
            --creme: #fdf5e6;
            --branco: #ffffff;
            --sombra: 0 20px 40px rgba(0,0,0,0.1);
            --sombra-hover: 0 25px 50px rgba(0,0,0,0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--creme);
            color: var(--marrom);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Header Moderno */
        header {
            background: var(--branco);
            padding: 1rem 0;
            box-shadow: var(--sombra);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }
        .logo {
            height: 60px;
            width: auto;
            transition: transform 0.3s;
        }
        .logo:hover { transform: scale(1.05); }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        .nav-menu a {
            color: var(--marrom);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }
        .nav-menu a:hover { color: var(--laranja); }
        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--laranja);
            transition: width 0.3s;
        }
        .nav-menu a:hover::after { width: 100%; }
        
        /* Hero Aprimorado */
        .hero {
            height: 100vh;
            min-height: 600px;
            background: linear-gradient(135deg, rgba(255,140,0,0.9), rgba(93,41,6,0.8)), 
                        url('banner.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--branco);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
        }
        .hero-content h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease-out;
        }
        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        .cta-button {
            display: inline-block;
            background: var(--branco);
            color: var(--laranja);
            padding: 1.2rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: var(--sombra);
            transition: all 0.3s;
            animation: fadeInUp 1s ease-out 0.4s both;
        }
        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: var(--sombra-hover);
            background: #f8f8f8;
        }
        
        /* Container Principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 2rem 50px;
        }
        
        /* Seção Destaques */
        .section-title {
            text-align: center;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            margin: 4rem 0 3rem;
            color: var(--marrom);
            position: relative;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--laranja);
            margin: 1rem auto;
            border-radius: 2px;
        }
        
        /* Vitrine COMPLETA com TODOS os 9 produtos */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        .produto {
            background: var(--branco);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--sombra);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }
        .produto::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--laranja), var(--laranja-escuro));
        }
        .produto:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: var(--sombra-hover);
        }
        .produto img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .produto:hover img {
            transform: scale(1.05);
        }
        .info {
            padding: 2rem;
            text-align: center;
        }
        .info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            color: var(--marrom);
            font-weight: 600;
        }
        .descricao {
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        .preco-produto {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--laranja);
            margin-bottom: 1rem;
        }
        .btn-comprar {
            background: linear-gradient(135deg, var(--laranja), var(--laranja-escuro));
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-comprar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,140,0,0.4);
        }
        
        /* Cardápio Elegante */
        .cardapio {
            background: var(--branco);
            border-radius: 25px;
            padding: 3rem;
            box-shadow: var(--sombra);
            margin: 4rem auto;
            max-width: 800px;
        }
        .cardapio-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .cardapio-item:hover {
            background: rgba(255,140,0,0.05);
            padding-left: 1rem;
            border-radius: 10px;
        }
        .cardapio-item:last-child { border-bottom: none; }
        .preco {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--laranja);
        }
        
        /* WhatsApp Premium */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 10px 30px rgba(37,211,102,0.4);
            z-index: 1000;
            text-decoration: none;
            transition: all 0.3s;
            gap: 0.2rem;
        }
        .whatsapp-float:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 40px rgba(37,211,102,0.5);
        }
        .whatsapp-float .pulse {
            animation: pulse 2s infinite;
        }
        
        /* Footer Moderno */
        footer {
            background: linear-gradient(135deg, var(--marrom), #3d1a00);
            color: white;
            text-align: center;
            padding: 4rem 2rem 2rem;
            margin-top: 5rem;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-content h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .contato-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .contato-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.1rem;
        }
        .contato-item i {
            color: var(--laranja);
            font-size: 1.5rem;
            width: 30px;
        }
        
        /* Animações */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hero-content h1 { font-size: 2.5rem; }
            .vitrine { 
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
            }
            .contato-info { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <nav class="nav-container">
            <img src="logo-horizontal.png" alt="Bolos da Tia Selma" class="logo">
            <ul class="nav-menu">
                <li><a href="#home">Início</a></li>
                <li><a href="#produtos">Produtos</a></li>
                <li><a href="#cardapio">Cardápio</a></li>
                <li
